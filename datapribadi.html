<html>

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #FFFAF9;

      padding: 30px;
      color: #555;
    }
    h2 {
      color: #FF85A1;
      font-size: 24px;

      padding-bottom: 10px;

    .layout-foto {

    .data-table tr:nth-child(odd) { background-color: #cde8f2; }
    .foto-grid {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 25px;
    }
    .foto-item {
      width: 130px;
      height: 130px;
      border-radius: 10px;
      border: 3px solid #FFB6C1;
      overflow: hidden;
    }
    .foto-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      color: #FF85A1;
      margin: 25px 0 10px;
    }
  </style>
</head>
