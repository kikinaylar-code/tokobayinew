<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>KyBaby Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #header {
      height: 110px;
      flex-shrink: 0;
      border-bottom: 2px solid #FFB6C1;
    }
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #nav {
      width: 210px;
      min-width: 210px;
      border-right: 2px solid #FFB6C1;
      overflow-y: auto;
    }
    #konten {
      flex: 1;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- AREA A: HEADER -->
  <div id="header">
    <iframe src="header.html" scrolling="no"></iframe>
  </div>

  <!-- AREA B + C -->
  <div id="main">

    <!-- AREA B: NAV -->
    <div id="nav">
      <iframe src="nav.html" id="nav-frame" scrolling="auto"></iframe>
    </div>

    <!-- AREA C: KONTEN -->
    <div id="konten">
      <iframe src="welcome.html" name="konten" id="konten-frame"></iframe>
    </div>

  </div>

</body>
</html>
